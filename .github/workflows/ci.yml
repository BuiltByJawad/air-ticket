name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API – lint / typecheck / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: air_ticket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @air-ticket/api prisma:generate

      - name: Lint
        run: pnpm --filter @air-ticket/api lint

      - name: Typecheck
        run: pnpm --filter @air-ticket/api typecheck

      - name: Unit tests
        run: pnpm --filter @air-ticket/api test

      - name: E2E tests
        run: pnpm --filter @air-ticket/api test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/air_ticket_test?schema=public
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          NODE_ENV: test

      - name: Build
        run: pnpm --filter @air-ticket/api build

  web:
    name: Web – lint / typecheck / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @air-ticket/web lint

      - name: Typecheck
        run: pnpm --filter @air-ticket/web typecheck

      - name: Build
        run: pnpm --filter @air-ticket/web build
